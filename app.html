<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proteva — Caregiver Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4FBF8; color: #1a1a1a; min-height: 100vh; }
  .logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: #1D9E75; }

  .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .auth-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 18px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-card .logo { text-align: center; margin-bottom: 0.5rem; }
  .auth-sub { text-align: center; font-size: 14px; color: #777; margin-bottom: 1.75rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 13px 15px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; background: #fff; }
  .field input:focus, .field select:focus { border-color: #1D9E75; }
  .btn-primary { width: 100%; background: #1D9E75; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #0F6E56; }
  .btn-primary:disabled { background: #9FE1CB; cursor: not-allowed; }
  .auth-toggle { text-align: center; font-size: 14px; color: #777; margin-top: 1.25rem; }
  .auth-toggle a { color: #1D9E75; font-weight: 600; text-decoration: none; cursor: pointer; }
  .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 1rem; display: none; }
  .msg.error { background: #FCEBEB; color: #A32D2D; }
  .msg.success { background: #E1F5EE; color: #0F6E56; }

  .dash-wrap { display: none; max-width: 760px; margin: 0 auto; padding: 1.5rem; }
  .dash-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .dash-user { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E1F5EE; color: #0F6E56; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .logout-btn { background: transparent; border: 1.5px solid #ddd; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; }
  .logout-btn:hover { border-color: #1D9E75; color: #1D9E75; }
  .banner { border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 14px; transition: background 0.3s; }
  .banner.all-safe { background: #E1F5EE; }
  .banner.needs-review { background: #FAEEDA; }
  .banner-icon { font-size: 30px; }
  .banner.all-safe h2 { color: #085041; }
  .banner.all-safe p { color: #0F6E56; }
  .banner.needs-review h2 { color: #633806; }
  .banner.needs-review p { color: #854F0B; }
  .banner h2 { font-size: 17px; margin: 0; }
  .banner p { font-size: 13px; margin: 2px 0 0; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin: 0 0 12px; }
  .section-label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin: 0; }
  .add-btn { background: #E1F5EE; color: #0F6E56; border: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .add-btn:hover { background: #9FE1CB; }
  .member { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .m-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; background: #E1F5EE; color: #0F6E56; }
  .m-info { flex: 1; }
  .m-name { font-size: 15px; font-weight: 600; margin: 0; }
  .m-detail { font-size: 13px; color: #888; margin: 2px 0 0; }
  .status-select { border: 1.5px solid #eee; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; cursor: pointer; outline: none; background: #fff; }
  .status-select.safe { color: #0F6E56; border-color: #9FE1CB; background: #F4FBF8; }
  .status-select.review { color: #854F0B; border-color: #FAC775; background: #FFFBF3; }
  .m-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 4px; }
  .m-delete:hover { color: #A32D2D; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: #999; font-size: 14px; background: #fff; border: 1px dashed #ddd; border-radius: 14px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; padding: 1.5rem; z-index: 10; }
  .modal { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; }
  .modal h3 { font-size: 18px; margin: 0 0 1.25rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; background: #fff; border: 1.5px solid #ddd; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; color: #555; }
</style>
</head>
<body>

<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div class="logo">Pro<span>teva</span></div>
    <p class="auth-sub" id="auth-subtitle">Welcome back — sign in to your family dashboard</p>
    <div class="msg error" id="msg-error"></div>
    <div class="msg success" id="msg-success"></div>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign in</button>
    <p class="auth-toggle" id="toggle-text">
      New to Proteva? <a onclick="toggleMode()">Create an account</a>
    </p>
  </div>
</div>

<div class="dash-wrap" id="dash-screen">
  <div class="dash-top">
    <div class="logo" style="font-size:20px;">Pro<span>teva</span></div>
    <div class="dash-user">
      <span class="avatar" id="user-initial">U</span>
      <span style="font-size:13px;color:#777;" id="user-email">user@email.com</span>
      <button class="logout-btn" onclick="handleLogout()">Log out</button>
    </div>
  </div>

  <div class="banner all-safe" id="banner">
    <span class="banner-icon" id="banner-icon">🛡️</span>
    <div>
      <h2 id="banner-title">Everyone is safe today</h2>
      <p id="banner-sub">Loading your family...</p>
    </div>
  </div>

  <div class="section-head">
    <p class="section-label">Protected family</p>
    <button class="add-btn" onclick="openModal()">+ Add family member</button>
  </div>
  <div id="member-list"></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Add a family member</h3>
    <div class="msg error" id="modal-error"></div>
    <div class="field">
      <label for="m-name">Their name</label>
      <input type="text" id="m-name" placeholder="e.g. Grandma Rose" />
    </div>
    <div class="field">
      <label for="m-device">Their device</label>
      <input type="text" id="m-device" placeholder="e.g. iPhone, iPad" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-member-btn" onclick="addMember()">Add</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://njjhioejdqjwpeblrewb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qamhpb2VqZHFqd3BlYmxyZXdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTI4NTcsImV4cCI6MjA5NTQ4ODg1N30.QVR2gB5zOIg0NYjI78anipNYUFaorIrFMxw50768am4';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let isSignupMode = false;

  function showError(t){const e=document.getElementById('msg-error');e.textContent=t;e.style.display='block';document.getElementById('msg-success').style.display='none';}
  function showSuccess(t){const e=document.getElementById('msg-success');e.textContent=t;e.style.display='block';document.getElementById('msg-error').style.display='none';}
  function clearMsgs(){document.getElementById('msg-error').style.display='none';document.getElementById('msg-success').style.display='none';}

  function toggleMode(){
    isSignupMode=!isSignupMode; clearMsgs();
    if(isSignupMode){
      document.getElementById('auth-subtitle').textContent='Create your account to protect your family';
      document.getElementById('auth-btn').textContent='Create account';
      document.getElementById('toggle-text').innerHTML='Already have an account? <a onclick="toggleMode()">Sign in</a>';
    }else{
      document.getElementById('auth-subtitle').textContent='Welcome back — sign in to your family dashboard';
      document.getElementById('auth-btn').textContent='Sign in';
      document.getElementById('toggle-text').innerHTML='New to Proteva? <a onclick="toggleMode()">Create an account</a>';
    }
  }

  async function handleAuth(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const btn=document.getElementById('auth-btn');
    clearMsgs();
    if(!email||!email.includes('@')){showError('Please enter a valid email address.');return;}
    if(password.length<6){showError('Password must be at least 6 characters.');return;}
    btn.disabled=true; btn.textContent=isSignupMode?'Creating...':'Signing in...';
    try{
      if(isSignupMode){
        const {data,error}=await sb.auth.signUp({email,password});
        if(error)throw error;
        if(data.session){showDashboard(email);}
        else{showSuccess('Account created! Check your email to confirm, then sign in.');btn.disabled=false;toggleMode();}
      }else{
        const {data,error}=await sb.auth.signInWithPassword({email,password});
        if(error)throw error;
        showDashboard(email);
      }
    }catch(err){
      showError(err.message||'Something went wrong.');
      btn.disabled=false; btn.textContent=isSignupMode?'Create account':'Sign in';
    }
  }

  function showDashboard(email){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('dash-screen').style.display='block';
    document.getElementById('user-email').textContent=email;
    document.getElementById('user-initial').textContent=email.charAt(0).toUpperCase();
    loadMembers();
  }

  function updateBanner(people){
    const banner=document.getElementById('banner');
    const icon=document.getElementById('banner-icon');
    const title=document.getElementById('banner-title');
    const sub=document.getElementById('banner-sub');
    const count=people.length;
    const needsReview=people.filter(p=>p.status==='review').length;

    if(count===0){
      banner.className='banner all-safe'; icon.textContent='🛡️';
      title.textContent='Everyone is safe today';
      sub.textContent='Add your first family member to get started';
      return;
    }
    if(needsReview>0){
      banner.className='banner needs-review'; icon.textContent='⚠️';
      title.textContent=needsReview+' family member'+(needsReview>1?'s need':' needs')+' a look';
      sub.textContent='Tap their status to review · '+count+' protected total';
    }else{
      banner.className='banner all-safe'; icon.textContent='🛡️';
      title.textContent='Everyone is safe today';
      sub.textContent=count+' family member'+(count>1?'s':'')+' protected · last checked just now';
    }
  }

  async function loadMembers(){
    const list=document.getElementById('member-list');
    const {data,error}=await sb.from('protected_people').select('*').order('created_at',{ascending:true});
    if(error){list.innerHTML='<div class="empty">Could not load your family. Please refresh.</div>';return;}
    updateBanner(data);
    if(data.length===0){
      list.innerHTML='<div class="empty">No family members yet.<br>Click "+ Add family member" to add someone you want to protect.</div>';
      return;
    }
    list.innerHTML=data.map(p=>{
      const initials=p.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const device=p.device?p.device+' · protected':'protected';
      const st=p.status||'safe';
      return '<div class="member">'+
        '<span class="m-avatar">'+initials+'</span>'+
        '<div class="m-info"><p class="m-name">'+escapeHtml(p.name)+'</p><p class="m-detail">'+escapeHtml(device)+'</p></div>'+
        '<select class="status-select '+(st==='review'?'review':'safe')+'" onchange="updateStatus(\''+p.id+'\',this.value)">'+
          '<option value="safe"'+(st==='safe'?' selected':'')+'>✓ Safe</option>'+
          '<option value="review"'+(st==='review'?' selected':'')+'>⚠ Needs review</option>'+
        '</select>'+
        '<button class="m-delete" onclick="deleteMember(\''+p.id+'\')" title="Remove">×</button>'+
        '</div>';
    }).join('');
  }

  function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  async function updateStatus(id,status){
    await sb.from('protected_people').update({status}).eq('id',id);
    loadMembers();
  }

  function openModal(){document.getElementById('modal').style.display='flex';document.getElementById('m-name').value='';document.getElementById('m-device').value='';document.getElementById('modal-error').style.display='none';}
  function closeModal(){document.getElementById('modal').style.display='none';}

  async function addMember(){
    const name=document.getElementById('m-name').value.trim();
    const device=document.getElementById('m-device').value.trim();
    const btn=document.getElementById('save-member-btn');
    const err=document.getElementById('modal-error');
    err.style.display='none';
    if(!name){err.textContent='Please enter a name.';err.style.display='block';return;}
    btn.disabled=true; btn.textContent='Adding...';
    try{
      const {error}=await sb.from('protected_people').insert([{name,device}]);
      if(error)throw error;
      closeModal(); loadMembers();
    }catch(e){
      err.textContent='Could not add. Please try again.'; err.style.display='block';
    }
    btn.disabled=false; btn.textContent='Add';
  }

  async function deleteMember(id){
    await sb.from('protected_people').delete().eq('id',id);
    loadMembers();
  }

  async function handleLogout(){
    await sb.auth.signOut();
    document.getElementById('dash-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('email').value=''; document.getElementById('password').value='';
    document.getElementById('auth-btn').disabled=false;
    document.getElementById('auth-btn').textContent=isSignupMode?'Create account':'Sign in';
    clearMsgs();
  }

  async function checkSession(){
    const {data}=await sb.auth.getSession();
    if(data.session){showDashboard(data.session.user.email);}
  }
  checkSession();
</script>

</body>
</html>
